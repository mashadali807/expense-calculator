name: expense_tracker
description: A professional daily & monthly expense tracker app.
version: 3.0.0+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Local Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.2
  path: ^1.9.0
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  
  # State Management
  provider: ^6.1.2
  
  # Charts
  fl_chart: ^0.68.0
  
  # Firebase
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.14.0 
  
  # UI & Design
  google_fonts: ^6.1.0
  
  # Additional useful packages
  image_picker: ^1.0.5
  path_provider: ^2.1.1
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  # Add your assets here
  # assets:
  #   - assets/images/
  #   - assets/icons/
  
  # Add custom fonts here
  # fonts:
